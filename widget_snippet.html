
<!-- START OF INTERACTIVE GEOMODELING SANDBOX WIDGET -->
<section id="geostats-sandbox" style="margin-top: 40px; padding: 20px 0; border-top: 2px solid var(--nord-sub, #4C566A);">
    <h2 style="color: var(--nord-blue, #81A1C1); margin-bottom: 20px; font-size: 1.5rem;">Interactive Geomodeling Sandbox</h2>
    
    <div class="sandbox-container" style="background: var(--nord-card, #3B4252); border-radius: 12px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); font-family: 'Inter', sans-serif;">
        
        <div style="display: table; width: 100%; table-layout: fixed;">
            
            <!-- LEFT COLUMN: CONTROLS & VARIOGRAM -->
            <div style="display: table-cell; width: 50%; vertical-align: top; padding-right: 15px; box-sizing: border-box;">
                <div style="background: var(--nord-dark, #2E3440); padding: 15px; border-radius: 8px; margin-bottom: 20px;">
                    <label style="display: block; font-weight: 600; margin-bottom: 8px; color: var(--nord-text, #D8DEE9); font-size: 0.9rem;">
                        Nugget Effect (C₀): <span id="val-nugget" style="float: right; color: var(--nord-green, #A3BE8C); font-family: monospace;">0.10</span>
                    </label>
                    <input type="range" id="input-nugget" min="0" max="0.95" step="0.05" value="0.10" style="width: 100%; margin-bottom: 15px; accent-color: var(--nord-blue, #81A1C1);">

                    <label style="display: block; font-weight: 600; margin-bottom: 8px; color: var(--nord-text, #D8DEE9); font-size: 0.9rem;">
                        Range (a): <span id="val-range" style="float: right; color: var(--nord-green, #A3BE8C); font-family: monospace;">80</span> m
                    </label>
                    <input type="range" id="input-range" min="15" max="250" step="5" value="80" style="width: 100%; accent-color: var(--nord-blue, #81A1C1);">
                </div>

                <h3 style="color: var(--nord-blue, #81A1C1); margin-bottom: 10px; font-size: 1rem; text-align: center;">Spherical Variogram Model γ(h)</h3>
                <canvas id="canvas-variogram" width="380" height="260" style="background: var(--nord-dark, #2E3440); border-radius: 6px; display: block; margin: 0 auto;"></canvas>
            </div>

            <!-- RIGHT COLUMN: KRIGING MAP -->
            <div style="display: table-cell; width: 50%; vertical-align: top; padding-left: 15px; box-sizing: border-box;">
                <h3 style="color: var(--nord-blue, #81A1C1); margin-bottom: 10px; font-size: 1rem; text-align: center;">Walker Lake Grid (260m x 300m)</h3>
                <canvas id="canvas-kriging" width="312" height="360" style="background: var(--nord-dark, #2E3440); border-radius: 6px; display: block; margin: 0 auto;"></canvas>
                
                <div style="text-align: center; margin-top: 15px;">
                    <button id="btn-toggle-view" style="background: var(--nord-blue, #81A1C1); color: var(--nord-dark, #2E3440); border: none; padding: 8px 16px; border-radius: 4px; font-weight: bold; cursor: pointer; transition: background 0.2s;">
                        Switch to: Kriging Variance
                    </button>
                </div>
            </div>

        </div>
    </div>
</section>

    const inputRange = document.getElementById('input-range');
    const valNugget = document.getElementById('val-nugget');
    const valRange = document.getElementById('val-range');
    const btnToggleView = document.getElementById('btn-toggle-view');

    const ctxVario = document.getElementById('canvas-variogram').getContext('2d');
    const ctxKriging = document.getElementById('canvas-kriging').getContext('2d');

    function sphericalVariogram(h, nugget, range) {
        if (h === 0) return 0;
        const contribution = totalSill - nugget;
        if (h <= range) {
            return nugget + contribution * (1.5 * (h / range) - 0.5 * Math.pow(h / range, 3));
        }
        return totalSill;
    }

    function drawVariogram() {
        const w = ctxVario.canvas.width;
        const h = ctxVario.canvas.height;
        ctxVario.clearRect(0, 0, w, h);

        ctxVario.strokeStyle = '#4C566A';
        ctxVario.lineWidth = 1;
        ctxVario.font = '10px sans-serif';
        ctxVario.fillStyle = '#D8DEE9';

        const ySill = h - 35 - (1.0 * (h - 55));
        ctxVario.beginPath();
        ctxVario.setLineDash([4, 4]);
        ctxVario.moveTo(45, ySill);
        ctxVario.lineTo(w - 15, ySill);
        ctxVario.stroke();
        ctxVario.setLineDash([]);
        ctxVario.fillText("Sill = 1.0", w - 75, ySill - 6);

        ctxVario.strokeStyle = '#88C0D0';
        ctxVario.lineWidth = 2.5;
        ctxVario.beginPath();

        const maxDistX = 300; 
        for (let pixelX = 45; pixelX < w - 15; pixelX++) {
            const distance = ((pixelX - 45) / (w - 60)) * maxDistX;
            const gamma = sphericalVariogram(distance, currentNugget, currentRange);
            const pixelY = h - 35 - (gamma * (h - 55));

            if (pixelX === 45) ctxVario.moveTo(pixelX, pixelY);
            else ctxVario.lineTo(pixelX, pixelY);
        }
        ctxVario.stroke();

        ctxVario.strokeStyle = '#E5E9F0';
        ctxVario.lineWidth = 1.5;
        ctxVario.beginPath();
        ctxVario.moveTo(45, 15);
        ctxVario.lineTo(45, h - 35);
        ctxVario.lineTo(w - 15, h - 35);
        ctxVario.stroke();

        ctxVario.fillStyle = '#ECEFF4';
        ctxVario.fillText("γ(h)", 15, 20);
        ctxVario.fillText("Distance h (m)", w / 2 - 35, h - 10);
        ctxVario.fillText("0.0", 25, h - 35);
        ctxVario.fillText("1.0", 25, h - 35 - (1.0 * (h - 55)));
        
        const xRange = 45 + (currentRange / maxDistX) * (w - 60);
        if (xRange < w - 15) {
            ctxVario.strokeStyle = '#EBCB8B';
            ctxVario.beginPath();
            ctxVario.moveTo(xRange, h - 40);
            ctxVario.lineTo(xRange, h - 30);
            ctxVario.stroke();
            ctxVario.fillStyle = '#EBCB8B';
            ctxVario.fillText("a = " + currentRange + "m", xRange - 15, h - 20);
        }
    }

    function solveLinearSystem(A, B) {
        const n = B.length;
        for (let i = 0; i < n; i++) {
            let maxRow = i;
            for (let k = i + 1; k < n; k++) {
                if (Math.abs(A[k][i]) > Math.abs(A[maxRow][i])) maxRow = k;
            }
            let temp = A[i]; A[i] = A[maxRow]; A[maxRow] = temp;
            let t = B[i]; B[i] = B[maxRow]; B[maxRow] = t;

            for (let k = i + 1; k < n; k++) {
                let c = -A[k][i] / A[i][i];
                for (let j = i; j < n; j++) {
                    if (i === j) A[k][j] = 0;
                    else A[k][j] += c * A[i][j];
                }
                B[k] += c * B[i];
            }
        }
        const X = new Array(n).fill(0);
        for (let i = n - 1; i >= 0; i--) {
            X[i] = B[i] / A[i][i];
            for (let k = i - 1; k >= 0; k--) {
                B[k] -= A[k][i] * X[i];
            }
        }
        return X;
    }

    function runKriging() {
        const w = ctxKriging.canvas.width;
        const h = ctxKriging.canvas.height;
        const imgData = ctxKriging.createImageData(w, h);
        
        const step = 4; 
        const maxLocalNeighbors = 12; 

        for (let y = 0; y < h; y += step) {
            for (let x = 0; x < w; x += step) {
                const realX = x / SCALE;
                const realY = y / SCALE;

                let distances = [];
                for (let i = 0; i < dataset.length; i++) {
                    const dx = realX - dataset[i].x;
                    const dy = realY - dataset[i].y;
                    distances.push({ idx: i, d2: dx*dx + dy*dy });
                }
                distances.sort((a, b) => a.d2 - b.d2);
                
                let localSamples = [];
                for (let i = 0; i < Math.min(maxLocalNeighbors, distances.length); i++) {
                    localSamples.push(dataset[distances[i].idx]);
                }
                
                const n = localSamples.length;

                const matK = Array.from({ length: n + 1 }, () => new Array(n + 1).fill(0));
                for (let i = 0; i < n; i++) {
                    for (let j = 0; j < n; j++) {
                        const dx = localSamples[i].x - localSamples[j].x;
                        const dy = localSamples[i].y - localSamples[j].y;
                        const dist = Math.sqrt(dx*dx + dy*dy);
                        matK[i][j] = sphericalVariogram(dist, currentNugget, currentRange);
                    }
                    matK[i][n] = 1.0;
                    matK[n][i] = 1.0;
                }
                matK[n][n] = 0;

                const vecK = new Array(n + 1).fill(0);
                for (let i = 0; i < n; i++) {
                    const dx = realX - localSamples[i].x;
                    const dy = realY - localSamples[i].y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    vecK[i] = sphericalVariogram(dist, currentNugget, currentRange);
                }
                vecK[n] = 1.0;

                const weights = solveLinearSystem(matK, vecK);

                let estimate = 0;
                let variance = 0;
                for (let i = 0; i < n; i++) {
                    estimate += weights[i] * localSamples[i].val;
                    variance += weights[i] * vecK[i];
                }
                variance += weights[n];

                let r, g, b;
                if (viewMode === 'estimate') {
                    const normEst = Math.max(0, Math.min(1, estimate / 1100));
                    r = Math.floor(normEst * 255);
                    g = Math.floor((1 - Math.abs(normEst - 0.5) * 2) * 210);
                    b = Math.floor((1 - normEst) * 255);
                } else {
                    const normVar = Math.max(0, Math.min(1, variance / 1.05));
                    r = Math.floor(normVar * 235);
                    g = Math.floor(normVar * 195);
                    b = Math.floor(normVar * 140);
                }

                for (let sy = 0; sy < step; sy++) {
                    for (let sx = 0; sx < step; sx++) {
                        const px = x + sx;
                        const py = y + sy;
                        if (px < w && py < h) {
                            const idx = (py * w + px) * 4;
                            imgData.data[idx] = r;
                            imgData.data[idx+1] = g;
                            imgData.data[idx+2] = b;
                            imgData.data[idx+3] = 255;
                        }
                    }
                }
            }
        }
        ctxKriging.putImageData(imgData, 0, 0);

        dataset.forEach(s => {
            const canvasX = s.x * SCALE;
            const canvasY = s.y * SCALE;
            ctxKriging.beginPath();
            ctxKriging.arc(canvasX, canvasY, 1.5, 0, 2 * Math.PI);
            ctxKriging.fillStyle = 'rgba(229, 233, 240, 0.6)';
            ctxKriging.fill();
        });
    }

    function updateDashboard() {
        valNugget.innerText = currentNugget.toFixed(2);
        valRange.innerText = currentRange;
        drawVariogram();
        runKriging();
    }

    inputNugget.addEventListener('input', (e) => {
        currentNugget = parseFloat(e.target.value);
        updateDashboard();
    });

    inputRange.addEventListener('input', (e) => {
        currentRange = parseInt(e.target.value);
        updateDashboard();
    });

    btnToggleView.addEventListener('click', () => {
        if (viewMode === 'estimate') {
            viewMode = 'variance';
            btnToggleView.innerText = "Switch to: Estimated Grade";
        } else {
            viewMode = 'estimate';
            btnToggleView.innerText = "Switch to: Kriging Variance";
        }
        runKriging();
    });

    updateDashboard();
})();
</script>
